<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Games</title>

<link rel="icon
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #0f0f0f;
  color: #eaeaea;
}

.container {
  display: flex;
  height: 100vh;
}

.sidebar {
  width: 220px;
  background: #151515;
  padding: 20px;
}

.sidebar button {
  width: 100%;
  background: none;
  border: none;
  color: #ccc;
  padding: 8px 0;
  text-align: left;
  cursor: pointer;
}

.sidebar button:hover {
  color: #fff;
}

.content {
  flex: 1;
  padding: 25px;
}

.search-bar {
  width: 320px;
  padding: 10px;
  margin-bottom: 20px;
  background: #1c1c1c;
  border: 1px solid #2a2a2a;
  border-radius: 8px;
  color: #eee;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 15px;
}

.card {
  background: #1c1c1c;
  padding: 15px;
  border-radius: 8px;
  cursor: pointer;
}

.card:hover {
  background: #252525;
  transform: translateY(-4px);
}

.settings {
  position: fixed;
  right: -300px;
  top: 0;
  width: 300px;
  height: 100%;
  background: #121212;
  padding: 20px;
  transition: 0.25s;
}

.settings.open {
  right: 0;
}
</style>
</head>

<body>
<div class="container">

  <aside class="sidebar">
    <h2>🎮 Games</h2>
    <button onclick="toggleSettings()">⚙ Settings</button>
    <button onclick="filterGames('all')">All</button>
    <button onclick="filterGames('action')">Action</button>
    <button onclick="filterGames('puzzle')">Puzzle</button>
  </aside>

  <main class="content">
    <h2>Game Library</h2>

    <input
      id="searchBar"
      class="search-bar"
      placeholder="Search games..."
      onkeyup="searchGames()"
    >

    <div class="grid">
      <div class="card" data-category="action"><h3>Slope</h3></div>
      <div class="card" data-category="puzzle"><h3>2048</h3></div>
      <div class="card" data-category="idle"><h3>Cookie Clicker</h3></div>
    </div>
  </main>
</div>

<div class="settings" id="settings">
  <h3>Settings</h3>
  <button onclick="toggleSettings()">Close</button>
</div>

<script>
function toggleSettings() {
  document.getElementById("settings").classList.toggle("open");
}

function filterGames(cat) {
  document.querySelectorAll(".card").forEach(c => {
    c.style.display =
      cat === "all" || c.dataset.category === cat ? "block" : "none";
  });
}

function searchGames() {
  const q = document.getElementById("searchBar").value.toLowerCase();
  document.querySelectorAll(".card").forEach(c => {
    c.style.display = c.innerText.toLowerCase().includes(q) ? "block" : "none";
  });
}
</script>

</body>
</html>
