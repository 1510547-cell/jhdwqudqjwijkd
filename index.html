<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Games</title>
  <link rel="icon" id="favicon" href="icons/games.ico">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <h1>🎮 Games</h1>

    <button onclick="toggleSettings()">⚙ Settings</button>

    <hr>

    <h3>Categories</h3>
    <button onclick="filterGames('all')">All</button>
    <button onclick="filterGames('action')">Action</button>
    <button onclick="filterGames('arcade')">Arcade</button>
    <button onclick="filterGames('idle')">Idle</button>
    <button onclick="filterGames('puzzle')">Puzzle</button>
    <button onclick="filterGames('multiplayer')">Multiplayer</button>
  </aside>

  <!-- Main Content -->
  <main class="content">
    <h2>Game Library</h2>

    <div class="grid" id="gameGrid">

      <div class="card" data-category="arcade" onclick="openGame('https://example.com')">
        <h3>Cookie Clicker 🍪</h3>
        <p>Idle / Arcade</p>
      </div>

      <div class="card" data-category="action" onclick="openGame('https://example.com')">
        <h3>Slope</h3>
        <p>Fast‑paced action</p>
      </div>

      <div class="card" data-category="puzzle" onclick="openGame('https://example.com')">
        <h3>2048</h3>
        <p>Number puzzle</p>
      </div>

      <div class="card" data-category="multiplayer" onclick="openGame('https://example.com')">
        <h3>Krunker</h3>
        <p>FPS Multiplayer</p>
      </div>

      <div class="card" data-category="idle" onclick="openGame('https://example.com')">
        <h3>Idle Breakout</h3>
        <p>Idle game</p>
      </div>

      <div class="card" data-category="arcade" onclick="openGame('https://example.com')">
        <h3>Retro Bowl</h3>
        <p>Sports Arcade</p>
      </div>

      <div class="card" data-category="puzzle" onclick="openGame('https://example.com')">
        <h3>Wordle</h3>
        <p>Puzzle Game</p>
      </div>

    </div>
  </main>
</div>

<!-- Settings Panel -->
<div class="settings" id="settings">
  <h2>⚙ Settings</h2>

  <h4>Tab Cloaker</h4>
  <button onclick="setTab('Google Docs','icons/docs.ico')">📄 Docs</button>
  <button onclick="setTab('Google Classroom','icons/classroom.ico')">🎓 Classroom</button>
  <button onclick="setTab('Google Drive','icons/drive.ico')">📁 Drive</button>
  <button onclick="setTab('Gmail','icons/gmail.ico')">✉ Gmail</button>
  <button onclick="setTab('Games','icons/games.ico')">🎮 Default</button>

  <br><br>
  <button onclick="toggleSettings()">Close</button>
</div>

<script src="script.js"></script>
</body>
</html>
``
