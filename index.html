<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Games</title>

  <!-- Favicon -->
  <link id="favicon" rel="icon" href="icons/games.ico">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
      <h1>🎮 Games</h1>

      <button onclick="toggleSettings()">⚙ Settings</button>
      <hr>

      <h3>Categories</h3>
      <button onclick="filterGames('all')">All</button>
      <button onclick="filterGames('action')">Action</button>
      <button onclick="filterGames('arcade')">Arcade</button>
      <button onclick="filterGames('idle')">Idle</button>
      <button onclick="filterGames('puzzle')">Puzzle</button>
      <button onclick="filterGames('multiplayer')">Multiplayer</button>
    </aside>

    <!-- Main Content -->
    <main class="content">
      <h2>Game Library</h2>

      <!-- Search Bar -->
      <input
        type="text"
        id="searchBar"
        class="search-bar"
        placeholder="Search games..."
        onkeyup="searchGames()"
      >

      <!-- Games -->
      <div class="grid">
        <div class="card" data-category="idle">
          <h3>Cookie Clicker 🍪</h3>
        </div>

        <div class="card" data-category="action">
          <h3>Slope 🎱</h3>
        </div>

        <div class="card" data-category="puzzle">
          <h3>2048 🧩</h3>
        </div>

        <div class="card" data-category="multiplayer">
          <h3>Krunker 🔫</h3>
        </div>

        <div class="card" data-category="arcade">
          <h3>Retro Bowl 🏈</h3>
        </div>
        <div class="card" data-category="puzzle">
          <h3>Wordle 🧩</h3>
        </div>
      </div>
    </main>
  </div>

  <!-- Settings Panel -->
  <div class="settings" id="settings">
    <h2>⚙ Settings</h2>

    <button onclick="setTab('Google Docs','icons/docs.ico')">📄 Docs</button>
    <button onclick="setTab('Google Classroom','icons/classroom.ico')">🎓 Classroom</button>
    <button onclick="setTab('Gmail','icons/gmail.ico')">✉ Gmail</button>
    <button onclick="setTab('Games','icons/games.ico')">🎮 Default</button>

    <br><br>
    <button onclick="toggleSettings()">Close</button>
  </div>

  <!-- Scripts -->
  <script src="script.js"></script>
</body>
</html>
